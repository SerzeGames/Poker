  const list=lobbyList();
  const humans=list.length;
  const maxAI = MAX_SEATS - humans;
  if(aiCount>maxAI) aiCount=maxAI;
  if(aiCount<0) aiCount=0;
  const empties = MAX_SEATS - humans - aiCount;
  const total = humans + aiCount;
  const fillLines =
      (aiCount>0?`<div class="lobby-row dim">+ ${aiCount} ordinateur(s) IA</div>`:'')
    + (empties>0?`<div class="lobby-row dim">${empties} siège(s) vide(s)</div>`:'');
  const rows=list.map(p=>`<div class="lobby-row">${p.host?'👑 ':'🧑 '}${esc(p.name)}${p.host?' · vous':''}</div>`).join('') + fillLines;
  const canStart = total>=2;
  const goLabel = !canStart ? 'En attente de joueurs (min. 2)…' : 'Démarrer ('+total+' joueurs)';
  showOverlay(`
    <div class="ov-kicker">Partie en ligne — Hôte</div>
    <h1 class="ov-title">En attente de joueurs…</h1>
    <p class="ov-sub">Les joueurs qui cliquent sur <b>Rejoindre</b> arrivent ici automatiquement.</p>
    <div class="lobby-list">${rows}</div>

    <div class="diff-title">Tapis de départ</div>
    <input type="range" id="stackRange" class="rng" min="500" max="20000" step="500" value="${startStack}">
    <div class="rng-val"><span id="stackVal">${fmt(startStack)}</span> jetons</div>

    <div class="diff-title">Ordinateurs (IA) — ${maxAI===0?'aucun siège libre':('max '+maxAI)}</div>
    <div class="stepper">
      <button id="aiMinus" ${aiCount<=0?'disabled':''}>−</button>
      <div class="step-val"><span id="aiVal">${aiCount}</span> IA</div>
      <button id="aiPlus" ${aiCount>=maxAI?'disabled':''}>+</button>
    </div>

    ${aiCount>0?`<div class="diff-title">Niveau de l’IA</div>
    <div class="seg" id="diffSeg">
      <button data-d="facile">Facile<span class="lbl">passifs</span></button>
      <button data-d="normal">Normal<span class="lbl">équilibrés</span></button>
      <button data-d="agressif">Agressif<span class="lbl">bluffeurs</span></button>
    </div>`:''}

    <button class="ov-btn primary" id="btnGo" ${canStart?'':'data-block="1"'}>${goLabel}</button>
    <button class="ov-btn ghost" id="btnCancel">Annuler</button>
  `);
  if(aiCount>0) wireDiff();
  const sr=document.getElementById('stackRange'), sv=document.getElementById('stackVal');
  sr.oninput=()=>{ startStack=parseInt(sr.value,10)||START_STACK; sv.textContent=fmt(startStack); };
  document.getElementById('aiMinus').onclick=()=>{ if(aiCount>0){ aiCount--; renderHostLobby(); } };
  document.getElementById('aiPlus').onclick =()=>{ if(aiCount<maxAI){ aiCount++; renderHostLobby(); } };
  document.getElementById('btnGo').onclick=()=>{ if(canStart) hostStartGame(); };
  document.getElementById('btnCancel').onclick=netQuit;
}
function renderGuestLobby(msg){
  const rows=(msg.list||[]).map(p=>`<div class="lobby-row">${p.host?'👑 ':'🧑 '}${esc(p.name)}</div>`).join('');
  showOverlay(`
    <div class="ov-kicker">Partie en ligne — Invité</div>
    <h1 class="ov-title">Partie rejointe&nbsp;!</h1>
    <p class="ov-sub">En attente du lancement par l’hôte…</p>
    <div class="lobby-list">${rows}</div>
    <button class="ov-btn ghost" id="btnLeave">Quitter</button>
  `);
  document.getElementById('btnLeave').onclick=netQuit;
}
function renderJoinWaiting(text){
  showOverlay(`
    <div class="ov-kicker">Rejoindre une partie</div>
    <h1 class="ov-title">Recherche…</h1>
    <p class="ov-sub">${esc(text)}</p>
    <button class="ov-btn ghost" id="btnLeave">Annuler</button>
  `);
  document.getElementById('btnLeave').onclick=netQuit;
}
function renderNoGame(){
  showOverlay(`
    <div class="ov-kicker">Rejoindre une partie</div>
    <h1 class="ov-title">Aucune partie disponible</h1>
    <p class="ov-sub">Personne n’héberge de partie pour l’instant. Réessayez, ou créez la vôtre — les autres vous rejoindront.</p>
    <button class="ov-btn primary" id="bRetry">Réessayer</button>
    <button class="ov-btn ghost" id="bHost">Créer une partie</button>
    <button class="ov-btn ghost" id="bBack">Retour</button>
  `);
  document.getElementById('bRetry').onclick=joinGame;
  document.getElementById('bHost').onclick=startHostLobby;
  document.getElementById('bBack').onclick=netQuit;
}
function showPeerError(e){
  showOverlay(`
    <div class="ov-kicker" style="color:var(--red)">Connexion impossible</div>
    <h1 class="ov-title">Multijoueur indisponible</h1>
    <p class="ov-sub">Le serveur de mise en relation PeerJS est injoignable (hors-ligne ou bloqué par le réseau). Vous pouvez jouer en solo.</p>
    <button class="ov-btn primary" id="bk">Retour</button>
  `);
  document.getElementById('bk').onclick=()=>{ netRole='solo'; showStart(); };
}
function showNetOver(name){
  showOverlay(`
    <div class="ov-kicker" style="color:var(--gold)">Partie terminée</div>
    <h1 class="ov-title">${esc(name)} remporte la partie&nbsp;!</h1>
    <button class="ov-btn primary" id="bk">Retour au menu</button>
  `);
  document.getElementById('bk').onclick=netQuit;
}

function showOverlay(html){
  ovPanel.innerHTML=html;
  overlay.classList.add('show');
  modalOpen=true;
}
function hideOverlay(){
  overlay.classList.remove('show');
  modalOpen=false;
  // resume human timer if needed
  if(turnActive && awaitingHuman) turnEndsAt=performance.now()+TURN_TIME*1000;
}

function showStart(){
  netRole='solo'; started=false;
  showOverlay(`
    <div class="ov-kicker">Sit &amp; Go · No-Limit</div>
    <h1 class="ov-title">Texas Hold'em</h1>
    <div class="chips-row">♠ ♥ ♦ ♣</div>
    <label class="fld">Votre nom
      <input id="nameInput" maxlength="14" value="${esc(myName)}" placeholder="Joueur" autocomplete="off">
    </label>
    <button class="ov-btn primary" id="bSolo">Solo · contre l’IA</button>
    <button class="ov-btn ghost" id="bHost">Créer une partie en ligne</button>
    <button class="ov-btn ghost" id="bJoin">Rejoindre une partie</button>
    <button class="ov-btn ghost" id="bTheme">Thème : ${theme==='dark'?'Sombre 🌑':'Classique 🟢'}</button>
  `);
  const ni=document.getElementById('nameInput');
  const grab=()=>{ myName=((ni.value||'').trim().slice(0,14))||'Joueur'; savePref('name', myName); };
  document.getElementById('bSolo').onclick=()=>{ grab(); showSolo(); };
  document.getElementById('bHost').onclick=()=>{ grab(); startHostLobby(); };
  document.getElementById('bJoin').onclick=()=>{ grab(); joinGame(); };
  document.getElementById('bTheme').onclick=()=>{ grab(); theme=(theme==='dark'?'classic':'dark'); savePref('theme', theme); showStart(); };
}
function showSolo(){
  netRole='solo';
  showOverlay(`
    <div class="ov-kicker">Solo · contre l’IA</div>
    <h1 class="ov-title">Texas Hold'em</h1>
    <p class="ov-sub">Affrontez <b>4 adversaires</b> dans un tournoi à élimination.
       Dernier joueur en jeu remporte la partie.</p>
    <div class="diff-title">Niveau des adversaires</div>
    <div class="seg" id="diffSeg">
      <button data-d="facile">Facile<span class="lbl">passifs</span></button>
      <button data-d="normal">Normal<span class="lbl">équilibrés</span></button>
      <button data-d="agressif">Agressif<span class="lbl">bluffeurs</span></button>
    </div>
    <button class="ov-btn primary" id="btnPlay">Jouer</button>
    <button class="ov-btn ghost" id="btnBack">Retour</button>
  `);
  wireDiff();
  document.getElementById('btnPlay').onclick=()=>{ initAudio(); hideOverlay(); started=true; initTournament(); };
  document.getElementById('btnBack').onclick=showStart;
}
function showJoinPrompt(){ joinGame(); }   // (compat) — la recherche est automatique

function openMenu(){
  const dl={facile:'faciles',normal:'normaux',agressif:'agressifs'}[difficulty];
  showOverlay(`
    <div class="ov-kicker">Menu</div>
    <h1 class="ov-title">Pause</h1>
    <p class="ov-sub">Niveau ${level+1} · ${players.filter(p=>!p.busted).length} joueurs restants
       · adversaires <b>${dl}</b></p>
    <button class="ov-btn primary" id="mResume">Reprendre</button>
    <button class="ov-btn ghost" id="mTheme">Thème : ${theme==='dark'?'Sombre 🌑':'Classique 🟢'}</button>
    <button class="ov-btn ghost" id="mSound">Son : ${soundOn?'activé 🔊':'coupé 🔇'}</button>
    <button class="ov-btn ghost" id="mNew">Nouvelle partie…</button>
  `);
  document.getElementById('mResume').onclick=hideOverlay;
  document.getElementById('mTheme').onclick=()=>{ theme=(theme==='dark'?'classic':'dark'); savePref('theme', theme); openMenu(); };
  document.getElementById('mSound').onclick=()=>{ soundOn=!soundOn; savePref('sound', soundOn?'1':'0'); openMenu(); };
  document.getElementById('mNew').onclick=()=> isSolo()? showStart() : netQuit();
}

function showVictory(){
  showOverlay(`
    <div class="ov-kicker" style="color:var(--gold)">Tournoi terminé</div>
    <h1 class="ov-title">🏆 Victoire !</h1>
    <p class="ov-sub">Vous avez éliminé tous vos adversaires et terminez <b>1ʳ</b>.</p>
    <button class="ov-btn primary" id="vAgain">Rejouer</button>
  `);
  document.getElementById('vAgain').onclick=restartTournament;
}
function showEliminated(place){
  showOverlay(`
    <div class="ov-kicker" style="color:var(--red)">Éliminé</div>
    <h1 class="ov-title">Fin de parcours</h1>
    <p class="ov-sub">Vous terminez <b>${ordinal(place)}</b> sur ${seatedCount()}.
       La partie continue sans vous.</p>
    <button class="ov-btn primary" id="eAgain">Rejouer</button>
    <button class="ov-btn ghost" id="eWatch">Voir la fin</button>
  `);
  document.getElementById('eAgain').onclick=restartTournament;
  document.getElementById('eWatch').onclick=()=>{ hideOverlay(); scheduleNext(600,startHand); };
}
function showDefeat(place){
  showOverlay(`
    <div class="ov-kicker" style="color:var(--red)">Tournoi terminé</div>
    <h1 class="ov-title">Partie finie</h1>
    <p class="ov-sub">Vous aviez terminé <b>${ordinal(place)}</b>. ${isSolo()?'Une autre IA a remporté le tournoi.':'Un autre joueur a remporté le tournoi.'}</p>
    <button class="ov-btn primary" id="dAgain">Rejouer</button>
  `);
  document.getElementById('dAgain').onclick=restartTournament;
}

/* ----------------------------- Resize ---------------------------- */
function resize(){
  cssW=window.innerWidth; cssH=window.innerHeight;
  const dpr=Math.min(window.devicePixelRatio||1, 2.5);
  canvas.width=Math.round(cssW*dpr);
  canvas.height=Math.round(cssH*dpr);
  canvas.style.width=cssW+'px';
  canvas.style.height=cssH+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', ()=> setTimeout(resize,150));

/* ------------------------------ Boot ----------------------------- */
resize();
loadPrefs();
setupChat();
showStart();
requestAnimationFrame(render);
</script>
